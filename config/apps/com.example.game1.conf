# ============================================================================
# Zygisk Performance Suite - App Config: Example Game 1
# ============================================================================
# Application Package: com.example.game1
# Description: High-performance gaming configuration with spoofing
# ============================================================================

# ============================================================================
# CPU FREQUENCY SCALING (in kHz)
# ============================================================================
# Override default CPU minimum frequency for this app
cpu_min_freq=576000

# Override default CPU maximum frequency for this app
cpu_max_freq=2880000

# CPU governor for this app (performance, powersave, schedutil)
cpu_governor=performance

# ============================================================================
# GPU FREQUENCY SCALING (in MHz)
# ============================================================================
# Override default GPU minimum frequency
gpu_min_freq=300

# Override default GPU maximum frequency
gpu_max_freq=800

# ============================================================================
# SCHEDULER TUNING
# ============================================================================
# Schedtune boost for gaming (0-100; higher = more GPU focus)
schedtune_boost=50

# UCLAMP constraints (0-1024)
uclamp_min=256
uclamp_max=1024

# ============================================================================
# DEVICE SPOOFING
# ============================================================================
# Spoof device model (game may check for specific devices)
spoof_model=SM-G998B

# Spoof manufacturer
spoof_manufacturer=Samsung

# Spoof device codename
spoof_device=o1s

# Spoof Android SDK level
spoof_sdk=33

# Additional game-specific properties (comma-separated, optional)
# Examples: ro.product.is_game_device=true, ro.hardware.audio.primary=msm8998
game_props=ro.product.is_game_device=true,ro.hardware.keystore=msm8998

# ============================================================================
# FPS UNLOCK & RENDERING
# ============================================================================
# Enable FPS unlock for this app (1 = enabled, 0 = disabled)
unlock_fps=1

# Target FPS to unlock (60, 90, 120, 144, 240, etc.)
target_fps=120

# Hook priority (lower = higher priority; 0-100)
hook_priority=10

# Game engine detection (il2cpp, unity, unreal, custom)
game_engine=unity

# Optional: Specific library hooks (comma-separated)
# Examples: libil2cpp.so,libUnity.so
library_hooks=libil2cpp.so,libUnity.so

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================
# Minimum available memory (in MB) to maintain
min_available_memory=512

# Enable aggressive memory tuning (1 = enabled, 0 = disabled)
enable_mem_tuning=1

# ============================================================================
# POWER PROFILE
# ============================================================================
# Power mode: balanced, performance, power_saving
power_mode=performance
