# ============================================================================
# Zygisk Performance Suite - Global Configuration
# ============================================================================
# This file contains default settings applied to all apps unless overridden
# by app-specific configurations in the config/apps/ directory.
#
# Format: key=value (one per line)
# Lines starting with '#' are comments
# ============================================================================

# ============================================================================
# CPU FREQUENCY SCALING (in kHz)
# ============================================================================
# Minimum CPU frequency (usually 300MHz = 300000 kHz)
default_cpu_min_freq=300000

# Maximum CPU frequency (varies by device; example: 2.8GHz = 2880000 kHz)
default_cpu_max_freq=2880000

# CPU frequency governor (options: performance, powersave, schedutil, ondemand)
default_cpu_governor=schedutil

# ============================================================================
# GPU FREQUENCY SCALING (in MHz)
# ============================================================================
# Minimum GPU frequency (device-specific)
default_gpu_min_freq=100

# Maximum GPU frequency (device-specific; example: 800 MHz)
default_gpu_max_freq=800

# ============================================================================
# SCHEDULER TUNING
# ============================================================================
# Schedtune boost level (0-100; higher = more performance)
default_schedtune_boost=0

# UCLAMP constraints (0-1024; higher = more performance headroom)
default_uclamp_min=0
default_uclamp_max=1024

# ============================================================================
# GENERAL SETTINGS
# ============================================================================
# Enable/disable logging (1 = enabled, 0 = disabled)
enable_logging=1

# Log output path
log_path=/data/adb/modules/zygisk_perf_suite/logs

# Enable per-app device spoofing globally (1 = enabled, 0 = disabled)
enable_spoof_global=1

# Enable FPS unlock globally (1 = enabled, 0 = disabled)
enable_fps_unlock_global=1
