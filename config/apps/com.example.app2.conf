# ============================================================================
# Zygisk Performance Suite - App Config: Example App 2
# ============================================================================
# Application Package: com.example.app2
# Description: Balanced performance configuration for general apps
# ============================================================================

# ============================================================================
# CPU FREQUENCY SCALING (in kHz)
# ============================================================================
cpu_min_freq=300000
cpu_max_freq=2400000
cpu_governor=schedutil

# ============================================================================
# GPU FREQUENCY SCALING (in MHz)
# ============================================================================
gpu_min_freq=100
gpu_max_freq=600

# ============================================================================
# SCHEDULER TUNING
# ============================================================================
schedtune_boost=10
uclamp_min=0
uclamp_max=1024

# ============================================================================
# DEVICE SPOOFING
# ============================================================================
# Optional: Spoof as a different device for compatibility
spoof_model=SM-G973F
spoof_manufacturer=Samsung
spoof_device=star2lte
spoof_sdk=31

# ============================================================================
# FPS UNLOCK & RENDERING
# ============================================================================
unlock_fps=0
target_fps=60

# ============================================================================
# POWER PROFILE
# ============================================================================
power_mode=balanced
