name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        if: hashFiles('./gradlew') != ''

      - name: Build with Gradle
        run: ./gradlew build
        if: hashFiles('./gradlew') != ''

      - name: Build with Gradle (Wrapper not found - using gradle command)
        run: gradle build
        if: hashFiles('./gradlew') == ''

      - name: Upload build artifacts (JARs)
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-artifacts
          path: |
            build/libs/
            **/build/libs/
          retention-days: 30

      - name: Upload test reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-reports
          path: |
            build/reports/tests/
            **/build/reports/tests/
          retention-days: 30
