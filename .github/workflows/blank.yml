name: Java CI with Gradle

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check for Gradle build files and run build if present
        run: |
          echo "Checking for Gradle build files..."
          if [ -f build.gradle ] || [ -f build.gradle.kts ] || [ -f gradlew ]; then
            echo "Gradle build files found. Running Gradle build..."
            # Prefer the wrapper when present
            if [ -f gradlew ]; then
              chmod +x gradlew
              ./gradlew build --no-daemon --console=plain
            else
              # Fall back to system gradle if wrapper missing
              gradle build --no-daemon --console=plain
            fi
          else
            echo "No Gradle build files found in the repository root. Skipping Gradle build step."
          fi
